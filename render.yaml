services:
  - type: web
    name: breathe-esg-review
    env: python
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: cd backend && python manage.py migrate && python manage.py seed_demo
    startCommand: cd backend && gunicorn esg_audit.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
